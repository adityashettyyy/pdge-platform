# docker-compose.yml
# Run: docker compose up -d
# This starts PostgreSQL + Redis locally.
# Never install Postgres or Redis directly on your machine.
# Always use Docker for infrastructure — this is how professionals do it.

version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: pdge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pdge
      POSTGRES_PASSWORD: pdge_secret_change_in_prod
      POSTGRES_DB:       pdge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdge -d pdge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

# ─── USAGE ────────────────────────────────────────────────
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f postgres
# Reset:   docker compose down -v  (WARNING: deletes all data)
# Shell:   docker exec -it pdge-postgres psql -U pdge -d pdge_db
