services:
  postgres:
    image: postgres:16-alpine
    container_name: pdge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdge
      POSTGRES_PASSWORD: pdge_secret
      POSTGRES_DB: pdge_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U pdge -d pdge_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pdge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata: